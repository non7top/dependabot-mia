name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate-action:
    name: Validate Action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check shell script syntax
        run: |
          bash -n scripts/scan-dependabot.sh

      - name: Verify scripts are executable
        run: |
          test -x scripts/scan-dependabot.sh || (echo "scan-dependabot.sh is not executable" && exit 1)

      - name: Run shellcheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

      - name: Validate action.yml syntax
        run: |
          command -v action-validator >/dev/null 2>&1 || cargo install action-validator 2>/dev/null || echo "Skipping action-validator (not installed)"
          if command -v action-validator &>/dev/null; then
            action-validator action.yml
          fi

  test-action:
    name: Test Action (Self-Hosted)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run scanner on this repo
        uses: ./
        with:
          fail-on-missing: 'false'
          create-issue: 'false'
