name: 'Dependabot Configuration Scanner'

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      ecosystems:
        description: 'Comma-separated list of ecosystems to check (leave empty for auto-detect)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - '.github/workflows/dependabot-scan.yml'
      - 'scripts/scan-dependabot.sh'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  scan-dependabot:
    name: Scan for Missing Dependabot Configurations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Dependabot Scanner
        id: scan
        run: |
          chmod +x ./scripts/scan-dependabot.sh
          ./scripts/scan-dependabot.sh "${{ github.event.inputs.ecosystems }}" > scan-results.txt 2>&1 || true
          cat scan-results.txt

      - name: Upload scan results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependabot-scan-results
          path: scan-results.txt
          retention-days: 30

      - name: Create issue for missing configurations
        if: github.event_name != 'push'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('scan-results.txt', 'utf8');

            if (!results.includes('MISSING')) {
              console.log('No missing configurations detected');
              return;
            }

            const title = 'Missing Dependabot Configurations Detected';
            const body = [
              '## Dependabot Scan Results',
              '',
              'The automated scan has detected potential missing Dependabot configurations in this repository.',
              '',
              '### Details:',
              '```',
              results,
              '```',
              '',
              '### Recommended Actions:',
              '1. Review the detected ecosystems above',
              '2. Create or update `.github/dependabot.yml` with appropriate configurations',
              '3. Refer to [GitHub\'s Dependabot documentation](https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference#package-ecosystem-) for available options',
              '',
              '### Available Package Ecosystems:',
              '- npm / yarn (JavaScript)',
              '- pip (Python)',
              '- bundler (Ruby)',
              '- cargo (Rust)',
              '- nuget (.NET)',
              '- composer (PHP)',
              '- go-modules (Go)',
              '- gradle / maven (Java)',
              '- docker',
              '- github-actions',
              '- gitsubmodule',
              '- and more...',
              '',
              '---',
              '*This issue was automatically generated by the Dependabot Configuration Scanner*'
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dependabot-scan',
              state: 'open'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependabot-scan', 'security', 'good-first-issue']
              });
            }
