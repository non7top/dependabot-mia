name: 'Dependabot Configuration Scanner'

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      ecosystems:
        description: 'Comma-separated list of ecosystems to check (leave empty for auto-detect)'
        required: false
        default: ''
      create-issue:
        description: 'Create GitHub issue for missing configs'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      create-pr:
        description: 'Create PR with suggested changes'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      fail-on-missing:
        description: 'Fail workflow if missing configs detected'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches: [master]
    paths:
      - 'action.yml'
      - 'scripts/scan-dependabot.sh'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scan-dependabot:
    name: Scan for Missing Dependabot Configurations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Dependabot Scanner
        id: scan
        uses: ./
        with:
          ecosystems: ${{ github.event.inputs.ecosystems }}
          fail-on-missing: ${{ github.event.inputs.fail-on-missing || 'true' }}
          create-issue: ${{ github.event.inputs.create-issue || 'true' }}
          create-pr: ${{ github.event.inputs.create-pr || 'false' }}
          labels: 'dependabot-scan,security,good-first-issue'

      - name: Upload scan results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependabot-scan-results
          path: scan-results.txt
          retention-days: 30

      - name: Display scan summary
        if: always()
        run: |
          echo "## Scan Result: ${{ steps.scan.outputs.scan-result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.scan.outputs.scan-output }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
